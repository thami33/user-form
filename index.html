<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Information Form</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            padding: 40px;
            max-width: 400px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #333;
            font-weight: 500;
            margin-bottom: 8px;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s, box-shadow 0.3s;
            font-family: inherit;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .message {
            margin-top: 20px;
            padding: 12px 14px;
            border-radius: 6px;
            font-size: 14px;
            display: none;
            text-align: center;
        }

        .message.success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .message.error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .error-text {
            color: #e74c3c;
            font-size: 12px;
            margin-top: 4px;
            display: none;
        }

        input.invalid {
            border-color: #e74c3c;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Get Started</h1>
        <p class="subtitle">Tell us a bit about yourself</p>

        <form id="userForm" data-os-form-id="9a885605-a22a-4fcf-beb2-d6e2293801ef" data-os-submit-url="https://os-staging-api.growfactory.ai/api/v1/native-tools/forms/9a885605-a22a-4fcf-beb2-d6e2293801ef/submit">
            <div class="form-group">
                <label for="fullName">Full Name</label>
                <input type="text" id="fullName" name="fullName" placeholder="John Doe" required>
                <div class="error-text" id="nameError">Please enter your full name</div>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="john@example.com" required>
                <div class="error-text" id="emailError">Please enter a valid email address</div>
            </div>

            <button type="submit">Submit</button>
        </form>

        <div class="message" id="successMessage">
            Thank you! We've received your information.
        </div>
        <div class="message" id="errorMessage">
            Please fill in all fields correctly.
        </div>
    </div>

    <script>
        const form = document.getElementById('userForm');
        const fullNameInput = document.getElementById('fullName');
        const emailInput = document.getElementById('email');
        const successMessage = document.getElementById('successMessage');
        const errorMessage = document.getElementById('errorMessage');
        const nameError = document.getElementById('nameError');
        const emailError = document.getElementById('emailError');

        // Email validation regex
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

        form.addEventListener('submit', function(e) {
            e.preventDefault();

            // Reset messages and errors
            successMessage.style.display = 'none';
            errorMessage.style.display = 'none';
            nameError.style.display = 'none';
            emailError.style.display = 'none';
            fullNameInput.classList.remove('invalid');
            emailInput.classList.remove('invalid');

            // Validate inputs
            let isValid = true;

            if (fullNameInput.value.trim() === '') {
                nameError.style.display = 'block';
                fullNameInput.classList.add('invalid');
                isValid = false;
            }

            if (emailInput.value.trim() === '' || !emailRegex.test(emailInput.value)) {
                emailError.style.display = 'block';
                emailInput.classList.add('invalid');
                isValid = false;
            }

            if (isValid) {
                // Log to console with timestamp
                const timestamp = new Date().toLocaleString();
                const userData = {
                    fullName: fullNameInput.value,
                    email: emailInput.value,
                    submittedAt: timestamp
                };
                console.log('Form Submission:', userData);

                // Show success message
                successMessage.style.display = 'block';

                // Clear form
                form.reset();

                // Hide success message after 3 seconds
                setTimeout(() => {
                    successMessage.style.display = 'none';
                }, 3000);
            } else {
                errorMessage.style.display = 'block';
            }
        });

        // Clear error messages on input
        fullNameInput.addEventListener('focus', function() {
            nameError.style.display = 'none';
            fullNameInput.classList.remove('invalid');
        });

        emailInput.addEventListener('focus', function() {
            emailError.style.display = 'none';
            emailInput.classList.remove('invalid');
        });
    </script>

<script data-os-form-tracking="true">
(function() {
  if (window.__osFormTrackingInstalled) return;
  window.__osFormTrackingInstalled = true;

  document.querySelectorAll("form[data-os-submit-url]").forEach(function(form) {
    if (form.dataset.osTrackingBound === "true") return;
    form.dataset.osTrackingBound = "true";

    form.addEventListener("submit", function(e) {
      e.preventDefault();
      var submitUrl = form.getAttribute("data-os-submit-url");
      if (!submitUrl) return;

      var formData = new FormData(form);
      var data = {};
      formData.forEach(function(value, key) { data[key] = value; });

      var btn = form.querySelector('[type="submit"]');
      if (btn) btn.disabled = true;

      fetch(submitUrl, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
      }).then(function(resp) {
        if (resp.ok) {
          form.innerHTML = '<p style="padding:20px;text-align:center;font-size:18px;">Thank you for your submission!</p>';
        } else {
          alert("Submission failed. Please try again.");
          if (btn) btn.disabled = false;
        }
      }).catch(function() {
        alert("Submission failed. Please try again.");
        if (btn) btn.disabled = false;
      });
    }, true);
  });
})();
</script>
</body>
</html>
